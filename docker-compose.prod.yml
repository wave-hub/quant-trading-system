version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quant_postgres_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quant_trading
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quant_redis_prod
    volumes:
      - redis_data_prod:/data
    command: redis-server --appendonly yes
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: quant_backend_prod
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/quant_trading
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: quant_celery_worker_prod
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/quant_trading
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: celery -A backend.tasks.celery_app worker --loglevel=info
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: quant_frontend_prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  default:
    name: quant_network_prod
