version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quant_postgres_local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quant_trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: quant_redis_local
    ports:
      - "6379:6379"
    volumes:
      - redis_data_local:/data
    command: redis-server --appendonly yes
    restart: always

volumes:
  postgres_data_local:
  redis_data_local:
